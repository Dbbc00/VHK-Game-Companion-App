server:
  port: 8080
  servlet:
    context-path: /

spring:
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/vhk_game}
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:your-secret-key}
  expiration: 86400000

wechat:
  appId: ${WECHAT_APPID:your-appid}
  secret: ${WECHAT_SECRET:your-secret}

wechat-pay:
  mchId: ${WECHAT_PAY_MCHID:your-mchid}
  key: ${WECHAT_PAY_KEY:your-key}
  notifyUrl: ${WECHAT_PAY_NOTIFY_URL:http://your-domain.com/api/pay/notify}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: alpha

logging:
  level:
    root: info
    com.vhk.gamecompanion: debug